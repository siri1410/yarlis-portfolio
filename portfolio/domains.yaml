  # ============================================================
  # SDODS - DEVELOPER FRAMEWORK
  # ============================================================
  - id: sdods
    domain: sdods.com
    name: "SDODS"
    tagline: "Software Development & Operations Data Systems"
    status: published
    priority: P2
    
    description: |
      Open-source developer framework with reusable components.
      The building blocks that power the Yarlis ecosystem.
    
    value_proposition: |
      Stop reinventing the wheel. Production-ready components
      for auth, UI, observability, and more.
    
    packages:
      - name: "@sdods/core"
        description: "Utilities, Result type, retry, debounce"
        npm: https://npmjs.com/package/@sdods/core
        version: "0.1.0"
      - name: "@sdods/auth"
        description: "Provider-agnostic auth with Firebase adapter"
        npm: https://npmjs.com/package/@sdods/auth
        version: "0.1.0"
      - name: "@sdods/ui"
        description: "React components: Button, Card, Input, ThemeProvider"
        npm: https://npmjs.com/package/@sdods/ui
        version: "0.1.0"
      - name: "@sdods/observability"
        description: "Logger, Tracer, Metrics with OpenTelemetry"
        npm: https://npmjs.com/package/@sdods/observability
        version: "0.1.0"
    
    moat:
      - Ecosystem gravity (used across all Yarlis products)
      - Developer community contributions
      - First-mover in integrated AI-ops components
    
    pricing:
      model: open_core
      tiers:
        - name: Open Source
          price: 0
          limits: "Core packages, community support"
        - name: Pro
          price: 49
          period: monthly
          limits: "Premium components, priority support"
        - name: Enterprise
          price: custom
          limits: "Custom components, SLA, training"
    
    tech_stack:
      languages: ["TypeScript"]
      build: ["Turborepo", "tsup"]
      testing: ["Vitest"]
      docs: ["TypeDoc"]
    
    urls:
      production: https://sdods.com
      npm_org: https://npmjs.com/org/sdods
      npm_core: https://npmjs.com/package/@sdods/core
      npm_auth: https://npmjs.com/package/@sdods/auth
      npm_ui: https://npmjs.com/package/@sdods/ui
      npm_observability: https://npmjs.com/package/@sdods/observability
      github: https://github.com/siri1410/sdods
    
    security:
      review_schedule: "Quarterly (Feb, May, Aug, Nov)"
      next_review: "2026-05-01"
      policy: "Alert only for official CVEs/advisories"

