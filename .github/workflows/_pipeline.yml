# ============================================================
# Yarlis Reusable Pipeline v2 — with App Registry + Vault
# @sdods/observability → build telemetry
# @sdods/comms → Telegram + email notifications
# ============================================================

name: Yarlis Pipeline v2
on:
  workflow_call:
    inputs:
      yar_id:
        description: "YAR App ID (from app-registry.yaml)"
        required: true
        type: string
      domain:
        description: "Domain code (rtm, mbx, yai, sdo)"
        required: true
        type: string
      app_type:
        description: "App type (firebase-hosting|npm-library|cloud-run)"
        required: true
        type: string
      project_id:
        description: "GCP/Firebase project ID"
        required: true
        type: string
      node_version:
        default: "20"
        type: string
      run_e2e:
        default: true
        type: boolean
      deploy_staging:
        default: true
        type: boolean
      deploy_prod:
        default: true
        type: boolean
      base_url_prod:
        required: false
        type: string
      base_url_staging:
        required: false
        type: string
    secrets:
      WIF_PROVIDER:
        required: true
      WIF_SA:
        required: true

jobs:
  # ── 1. Build ──────────────────────────────────────────────
  build:
    name: "📦 [${{ inputs.yar_id }}] Build"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: "🔱 App identity"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  YAR ID   : ${{ inputs.yar_id }}"
          echo "  Domain   : ${{ inputs.domain }}"
          echo "  App Type : ${{ inputs.app_type }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --if-present || true

      - name: Lint
        run: npm run lint --if-present || true

      - name: Build
        run: npm run build

      - name: App metadata
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version" 2>/dev/null || echo '0.0.0')" >> $GITHUB_OUTPUT

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            dist/
            functions/lib/
            .next/
            build/
          key: build-${{ inputs.yar_id }}-${{ github.sha }}

  # ── 2. Test ───────────────────────────────────────────────
  test:
    name: "🧪 [${{ inputs.yar_id }}] Test"
    runs-on: ubuntu-latest
    needs: build
    if: inputs.run_e2e

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Authenticate to GCP (OIDC — keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Fetch test secrets from Vault
        id: vault
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            api_token:yarlis-platform/ypid_${{ inputs.domain }}_prod_rapidtriage-api-token

      - name: E2E — API flows
        run: npx playwright test --project=api-flows --reporter=github
        env:
          RAPIDTRIAGE_BASE_URL: ${{ inputs.base_url_prod }}
          RAPIDTRIAGE_TEST_TOKEN: ${{ steps.vault.outputs.api_token }}

      - name: E2E — UI flows
        if: inputs.app_type == 'firebase-hosting'
        run: npx playwright test --project=auth-flows --project=marketing-flows --reporter=github
        env:
          RAPIDTRIAGE_BASE_URL: ${{ inputs.base_url_prod }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-${{ inputs.yar_id }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

  # ── 3. npm publish (for library type) ─────────────────────
  publish-npm:
    name: "📦 [${{ inputs.yar_id }}] Publish npm"
    runs-on: ubuntu-latest
    needs: build
    if: inputs.app_type == 'npm-library' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Fetch npm token from Vault
        id: vault
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            npm_token:yarlis-platform/ypid_all_prod_npm-token

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: dist/
          key: build-${{ inputs.yar_id }}-${{ github.sha }}

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ steps.vault.outputs.npm_token }}

  # ── 4. Deploy Staging ─────────────────────────────────────
  staging:
    name: "🚀 [${{ inputs.yar_id }}] Staging"
    runs-on: ubuntu-latest
    needs: [build, test]
    if: |
      inputs.deploy_staging &&
      inputs.app_type == 'firebase-hosting' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    environment:
      name: staging
      url: ${{ inputs.base_url_staging }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            functions/lib/
          key: build-${{ inputs.yar_id }}-${{ github.sha }}

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Fetch staging secrets from Vault
        id: vault
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            firebase_token:yarlis-platform/ypid_${{ inputs.domain }}_staging_firebase-token

      - name: Deploy staging channel
        run: |
          npx firebase-tools hosting:channel:deploy staging \
            --expires 7d \
            --project ${{ inputs.project_id }} \
            --token "${{ steps.vault.outputs.firebase_token }}"

      - name: E2E smoke vs staging
        run: |
          npx playwright test --project=api-flows --project=marketing-flows --reporter=list
        env:
          RAPIDTRIAGE_BASE_URL: ${{ inputs.base_url_staging }}
        continue-on-error: true

  # ── 5. Deploy Production ──────────────────────────────────
  production:
    name: "🌐 [${{ inputs.yar_id }}] Production"
    runs-on: ubuntu-latest
    needs: [staging]
    if: |
      inputs.deploy_prod &&
      inputs.app_type == 'firebase-hosting' &&
      github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ inputs.base_url_prod }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            functions/lib/
          key: build-${{ inputs.yar_id }}-${{ github.sha }}

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Fetch prod secrets from Vault
        id: vault
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            firebase_token:yarlis-platform/ypid_${{ inputs.domain }}_prod_firebase-token
            npm_token:yarlis-platform/ypid_all_prod_npm-token

      - name: Deploy to production
        run: |
          npx firebase-tools deploy \
            --project ${{ inputs.project_id }} \
            --token "${{ steps.vault.outputs.firebase_token }}"

      # @sdods/comms — Telegram notification
      - name: Notify via @sdods/comms
        if: always()
        run: |
          node -e "
          const status = '${{ job.status }}' === 'success' ? '✅' : '🔴';
          const msg = \`\${status} *[${{ inputs.yar_id }}]* deployed to prod
          Domain: ${{ inputs.domain }} | v${{ needs.build.outputs.version }}
          Commit: \${{ github.sha }}.slice(0,7)
          Actor: ${{ github.actor }}\`;
          // @sdods/comms would handle this — direct API for now
          require('https').request({
            hostname: 'api.telegram.org',
            path: \`/bot\${process.env.TG_TOKEN}/sendMessage\`,
            method: 'POST',
            headers: {'Content-Type':'application/json'}
          }, ()=>{}).end(JSON.stringify({chat_id:'5764179434',text:msg,parse_mode:'Markdown'}));
          "
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
